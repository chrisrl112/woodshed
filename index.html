<script>/* transcribe.html saves finished heads to charts/user-heads.json (via the local
   server) and a user-heads.js mirror (window.USER_HEADS) loaded just above, then any
   localStorage drafts. Both merge newest-wins by forTune, so a re-transcribed tune
   replaces the older head and shows in the Tune Vault in place of the Real Book scan. */
(function(){ const norm=s=>String(s||'').toLowerCase().replace(/[^a-z0-9]/g,'');
  function merge(saved){ if(!Array.isArray(saved)||!saved.length) return;
    const tunes=new Set(saved.map(c=>norm(c.forTune||c.title)));
    window.USER_CHARTS=window.USER_CHARTS.filter(c=>!(c&&c.abc&&tunes.has(norm(c.forTune||c.title)))).concat(saved); }
  try{ merge(window.USER_HEADS); }catch(e){}
  try{ merge(JSON.parse(localStorage.getItem('woodshed_user_charts')||'[]')); }catch(e){}
})();</script>
<!-- NOTE: charts-curated.js (Jazz 1460 community import) intentionally NOT loaded — that playlist
     diverges per-tune from Chris's own iReal Pro charts (e.g. TWNBAY bar 29), so the overlay would
     re-break hand-corrected tunes. Curated TUNES use their inline bars (corrected by hand from his
     iReal). charts-ireal.js (full import) stays lazy for the My Charts browser only. -->
<script>window.DRUM_TRACKS=window.DRUM_TRACKS||[];</script>

<style>
:root{
  /* BLUE NOTE SLEEVE: warm paper, ink black, one hot orange. Reid Miles energy. */
  --bg:#f2ecdf; --surface:#faf6ec; --surface2:#efe7d6; --surface3:#e5dac3;
  --line:#d6c9af; --line2:#b3a486;
  --brass:#e84e10; --brass-hi:#c23c07; --brass-dim:#f0824f;
  --cream:#1a150f; --muted:#5d5343; --faint:#968a72;
  --blue:#1d3fae; --red:#c23c07; --yellow:#d99a16; --green:#3f7d3b; --purple:#1d3fae; --teal:#1d3fae;
  --paper:#fffdf4; --ink:#1a150f;
  --shadow:1px 2px 0 rgba(26,21,15,.16);
  --shadow-lg:6px 6px 0 rgba(26,21,15,.85);
  --mono:'JetBrains Mono',monospace; --disp:'Archivo Black','Archivo',sans-serif; --ui:'Inter',sans-serif;
  --osw:'Oswald',var(--ui);
  /* ===== BROADSHEET LAYOUT SYSTEM ===== */
  --maxw:2160px;                       /* fill big monitors instead of a skinny centered strip */
  --gut:clamp(16px,2vw,40px);          /* page gutters (newspaper margins, fluid) */
  --head-h:150px;                      /* live sticky-header height, set by JS; sheet-music math reads this */
  /* ===== TYPE SCALE — nothing below 15px, scales up on wide screens ===== */
  --fs-eyebrow:clamp(15px,.9vw,17px);  /* kickers / labels */
  --fs-body:clamp(15px,1vw,18px);      /* body / meta / captions */
  --fs-tab:clamp(15px,1.15vw,22px);    /* section-index tabs */
  --fs-cardtitle:clamp(19px,1.5vw,24px);
  --fs-section:clamp(26px,2.6vw,40px); /* editorial section prose */
  --fs-bpm:clamp(34px,2.6vw,52px);
  --fs-hero:clamp(46px,6.4vw,118px);
  /* ===== AMBIENT WORLD ===== */
  --beat-ms:500ms;                     /* one beat = 60000/bpm, set by JS */
  --play-state:paused;                 /* running only while the metronome plays */
  --world-op:.34;                      /* atmosphere, never competing with the content */
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--cream);font-family:var(--ui);font-size:var(--fs-body);line-height:1.55}
h1,h2,h3{letter-spacing:-.01em}
::selection{background:var(--brass);color:#fff}
h1,h2,h3,.disp{font-family:var(--disp)}
a{color:var(--blue);text-decoration:none} a:hover{text-decoration:underline}
button{font-family:var(--ui);cursor:pointer;border:2px solid var(--ink);background:var(--paper);color:var(--ink);
  border-radius:5px;padding:8px 15px;font-size:15px;font-weight:700;transition:all .1s;box-shadow:3px 3px 0 var(--ink)}
button:hover{transform:translate(-1px,-1px);box-shadow:3px 3px 0 var(--ink)}
button:active{transform:translate(1px,1px);box-shadow:1px 1px 0 var(--ink)}
button.primary{background:var(--brass);color:#fff;border-color:var(--ink)}
button.primary:hover{background:var(--brass-hi);color:#fff}
button.ghost{background:transparent;border-color:var(--line2);box-shadow:none}
button.tiny{padding:5px 11px;font-size:14px;border-radius:5px;box-shadow:2px 2px 0 var(--ink)}
button.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}
button:disabled{opacity:.4;cursor:default}
input,select{background:#fff;border:1.5px solid var(--ink);color:var(--cream);border-radius:6px;
  padding:7px 10px;font-family:var(--mono);font-size:15px;outline:none}
input:focus,select:focus{border-color:var(--brass);box-shadow:0 0 0 3px rgba(232,78,16,.18)}
input[type=range]{padding:0;height:26px;accent-color:var(--brass);border:none;background:transparent;box-shadow:none}
textarea{background:#fff;border:1.5px solid var(--ink);color:var(--cream);border-radius:8px;padding:11px;
  font-family:var(--ui);font-size:15px;width:100%;min-height:70px;outline:none;resize:vertical}
textarea:focus{border-color:var(--brass);box-shadow:0 0 0 3px rgba(232,78,16,.18)}

/* ============ STICKY TOOLBAR ============ */
#toolbar{position:sticky;top:0;z-index:360;background:rgba(242,236,223,.97);backdrop-filter:blur(14px);
  border-bottom:4px solid var(--ink);padding:8px var(--gut) 7px}
#tb-row{display:flex;align-items:center;gap:7px 12px;flex-wrap:wrap;max-width:var(--maxw);margin:0 auto}
#logo{font-family:var(--disp);font-size:clamp(20px,1.55vw,30px);letter-spacing:-.6px;color:var(--ink);white-space:nowrap;text-transform:uppercase;line-height:1;flex:none;display:flex;align-items:center;gap:9px}
.logo-mark{height:clamp(24px,1.8vw,32px);width:auto;flex:none;display:block}
#logo b{color:var(--brass)}
#logo span{color:var(--muted);font-weight:500;font-family:var(--mono);font-size:clamp(11px,.8vw,13px);text-transform:none;letter-spacing:.04em}
@media(max-width:1500px){#logo span{display:none}}
.tb-group{display:flex;align-items:center;gap:6px;flex-wrap:nowrap}
/* compact toolbar buttons: trimmed padding so the whole rig fits one row */
#tb-row button{padding:6px 11px;font-size:14px;box-shadow:2px 2px 0 var(--ink)}
#tb-row button.tiny{padding:5px 9px;font-size:13.5px}
#tb-row button.icon{padding:5px 9px;font-size:16px;line-height:1;min-width:34px}
/* tuner / drone: black icon-only bubbles */
.tb-iconbtn{padding:0!important;width:34px;height:34px;display:inline-flex;align-items:center;justify-content:center;border-radius:8px}
.tb-iconbtn svg{width:19px;height:19px;display:block}
.tb-iconbtn.on{background:var(--ink)} .tb-iconbtn.on svg{stroke:var(--paper)}
#metro-subdiv{padding:5px 6px;font-size:15px}
#bpm-display{font-family:var(--mono);font-size:clamp(19px,1.5vw,26px);font-weight:700;color:var(--brass);width:auto;min-width:54px;text-align:center;
  background:var(--paper);border:2px solid var(--ink);border-radius:4px;padding:2px 7px;box-shadow:2px 2px 0 var(--ink)}
#bpm-slider{width:clamp(84px,7vw,140px)}
#beat-dots{display:flex;gap:5px;align-items:center;min-width:70px}
.bdot{width:10px;height:10px;border-radius:50%;background:transparent;border:1.5px solid var(--ink);transition:all .05s}
.bdot:nth-child(1).hit{background:var(--brass);border-color:var(--brass)}
.bdot.hit{background:var(--ink);transform:scale(1.35)}
#tap-bpm.flash{background:var(--brass);color:#1a1408}
.tb-spacer{flex:1}
#tb-panels{max-width:var(--maxw);margin:0 auto}
.tb-panel{display:none;padding:12px 4px 8px;border-top:1px dashed var(--line);margin-top:8px;
  display:none;align-items:center;gap:18px;flex-wrap:wrap}
.tb-panel.open{display:flex}
/* tuner */
#tuner-viz{display:flex;align-items:center;gap:16px}
#tuner-note{font-family:var(--mono);font-size:34px;font-weight:700;width:92px;text-align:center;color:var(--muted)}
#tuner-note.locked{color:var(--green);text-shadow:0 0 18px rgba(39,163,90,.4)}
#tuner-meter{width:240px;height:42px;position:relative;background:var(--paper);border:1.5px solid var(--ink);border-radius:6px;overflow:hidden}
#tuner-needle{position:absolute;left:50%;top:4px;bottom:4px;width:3px;background:var(--brass);border-radius:2px;transition:transform .09s}
#tuner-center{position:absolute;left:50%;top:0;bottom:0;width:1px;background:var(--line2)}
.tuner-zone{position:absolute;left:calc(50% - 14px);width:28px;top:0;bottom:0;background:rgba(39,163,90,.13)}
#tuner-level{height:4px;border-radius:2px;background:var(--surface3);width:120px;overflow:hidden}
#tuner-level i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--green),var(--yellow));transition:width .1s}
#tuner-cents{font-family:var(--mono);font-size:13px;color:var(--muted);width:84px}
/* ============ NAV — section index across the page ============ */
#nav{display:flex;gap:clamp(4px,1vw,22px);padding:0 var(--gut);max-width:var(--maxw);margin:0 auto;flex-wrap:wrap;
  align-items:stretch;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:355;
  background:rgba(242,236,223,.97);backdrop-filter:blur(14px);justify-content:space-between}
.navbtn{position:relative;background:transparent;border:none;border-radius:0;color:var(--muted);font-weight:700;font-family:var(--osw);
  text-transform:uppercase;letter-spacing:.3px;padding:clamp(10px,.9vw,16px) 2px;font-size:var(--fs-tab);box-shadow:none;line-height:1.05;white-space:nowrap}
.navbtn:hover{color:var(--brass);background:transparent;transform:none}
.navbtn:active{transform:none;box-shadow:none}
.navbtn.active{color:var(--brass);background:transparent;border:none;font-family:var(--osw);font-weight:700}
.navbtn.active::after{content:"";position:absolute;left:-2px;right:-2px;bottom:-1px;height:4px;background:var(--brass)}
/* ============ LAYOUT ============ */
main{max-width:var(--maxw);margin:0 auto;padding:0 var(--gut) 120px;position:relative;z-index:5}
.page{display:none;animation:fadein .25s}
.page.active{display:block}
@keyframes fadein{from{opacity:0;transform:translateY(4px)}to{opacity:1}}
/* ============ BROADSHEET — editorial page grammar (Today, Gym, tabs) ============ */
.dateline{display:flex;align-items:center;gap:11px;padding:clamp(16px,2vw,26px) 0 14px;border-bottom:1px solid var(--line)}
.dateline::before{content:"";width:11px;height:11px;border-radius:50%;background:var(--brass);flex:none}
.dateline span{font-family:var(--ui);font-weight:800;font-size:var(--fs-eyebrow);letter-spacing:1.4px;color:var(--muted);text-transform:uppercase}
.eyebrow{font-family:var(--ui);font-weight:800;font-size:var(--fs-eyebrow);letter-spacing:1.4px;text-transform:uppercase;color:var(--brass)}
.bs-grid{display:grid;grid-template-columns:minmax(0,1fr) clamp(300px,24vw,420px);gap:clamp(26px,3.2vw,68px);align-items:start;padding-top:clamp(18px,2.2vw,30px)}
@media(max-width:980px){.bs-grid{grid-template-columns:1fr}}
.bs-lead{border-bottom:4px solid var(--ink);padding-bottom:clamp(20px,2.2vw,30px)}
.bs-hero{font-family:var(--disp);font-size:var(--fs-hero);line-height:.84;letter-spacing:-2px;color:var(--ink);margin-bottom:16px}
.bs-stand{font-family:var(--osw);font-weight:500;font-size:clamp(19px,1.7vw,26px);text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:24px;line-height:1.2}
.bs-stand b{font-weight:600}
/* sub-page header (Vocab, Tunes, Ears, Progress, Manifesto, Config) — same grammar, moderate hero */
.bs-lead-pg{margin-bottom:clamp(18px,2vw,30px)}
.bs-hero-pg{font-size:clamp(38px,4.6vw,76px)}
.bs-cta-row{display:flex;gap:14px;flex-wrap:wrap}
.bn-cta{display:inline-flex;align-items:center;gap:10px;font-family:var(--osw);font-weight:700;font-size:clamp(17px,1.4vw,22px);
  letter-spacing:.5px;text-transform:uppercase;padding:14px 28px;background:var(--brass);color:#fffdf4;border:2px solid var(--ink);
  border-radius:4px;box-shadow:5px 5px 0 var(--ink);cursor:pointer}
.bn-cta:hover{transform:translate(-1px,-1px);box-shadow:6px 6px 0 var(--ink)}
.bn-cta:active{transform:translate(5px,5px);box-shadow:0 0 0 var(--ink)}
.bn-cta.ghost{background:var(--paper);color:var(--ink)}
/* right rail editorial cards */
.rail-card{border:2px solid var(--ink);box-shadow:5px 5px 0 var(--ink);background:var(--paper);padding:clamp(16px,1.4vw,22px)}
.rail-card.warm{background:var(--surface)}
.rail-card.accent{background:var(--brass);color:#fffdf4}
.streak-num{font-family:var(--disp);font-size:clamp(54px,4.6vw,82px);line-height:.8;color:var(--brass)}
.upnext-card{display:block;width:100%;text-align:left;cursor:pointer;border:2px solid var(--ink);box-shadow:5px 5px 0 var(--ink);background:var(--brass);color:#fffdf4;padding:clamp(16px,1.4vw,22px);border-radius:0}
.upnext-card:hover{transform:translate(-1px,-1px);box-shadow:6px 6px 0 var(--ink)}
.upnext-card:active{transform:translate(5px,5px);box-shadow:0 0 0 var(--ink)}
/* Today's editorial session sentence — reuse the live disclosure engine, drop its timeline chrome */
.today-session #session-plan .kicker,.today-session #session-plan .ses-hourlbl,
.today-session #session-plan .ses-bar,.today-session #session-plan .ses-legend,
.today-session #session-plan .ses-foot{display:none!important}
.today-session #session-plan .ses-spec{font-family:var(--osw)!important;font-weight:400!important;font-size:clamp(24px,2.8vw,40px)!important;line-height:1.5!important;color:var(--ink)!important;margin-top:0!important}
.today-session #session-plan .ses-pick{font-weight:600!important;color:var(--ink)!important;border-bottom:2px solid var(--ink)!important;white-space:normal!important}
.today-session #session-plan .ses-pick:hover{color:var(--brass)!important;border-bottom-color:var(--brass)!important}
.today-session #session-plan .ses-pick .cv{border-top-color:var(--ink)!important}
/* ===== THE GYM — music lead (left) + pick-your-work sidebar (right) ===== */
.gym-grid{display:grid;grid-template-columns:minmax(0,1fr) clamp(260px,23vw,330px);gap:clamp(20px,2.4vw,40px);align-items:start;padding-top:clamp(16px,1.8vw,26px)}
@media(max-width:980px){.gym-grid{grid-template-columns:1fr}}
.gym-lead-head{display:flex;align-items:flex-end;justify-content:space-between;gap:18px;margin-bottom:16px;flex-wrap:wrap}
.gym-lead-head h1{font-family:var(--disp);font-size:clamp(28px,3.2vw,46px);line-height:.94;letter-spacing:-1px;color:var(--ink)}
/* the FocusRender panels render into the lead — strip their card chrome so the framed sheet reads as the lead story */
#gym-lead-body .card{border:none!important;box-shadow:none!important;background:transparent!important;padding:0!important;margin:0!important}
#gym-lead-body .bookpage{box-shadow:8px 8px 0 rgba(26,21,15,.85);border-width:3px}
.gym-aside{position:sticky;top:calc(var(--head-h) + 12px)}
@media(max-width:980px){.gym-aside{position:static}}
.pick-card{border:2px solid var(--ink);box-shadow:5px 5px 0 var(--ink);background:var(--paper)}
.pick-head{padding:14px 16px;background:var(--brass);border-bottom:2px solid var(--ink)}
.pick-head .pk-kicker{font-family:var(--ui);font-weight:800;font-size:14px;letter-spacing:1.6px;color:#1a150f;text-transform:uppercase;margin-bottom:3px}
.pick-head .pk-title{font-family:var(--osw);font-weight:600;font-size:21px;color:#fffdf4;text-transform:uppercase;line-height:1}
.pick-group{padding:13px 16px 6px;font-family:var(--ui);font-weight:800;font-size:14px;letter-spacing:1.2px;color:var(--faint);text-transform:uppercase;border-top:1px solid var(--line)}
.pick-item{display:flex;align-items:center;gap:11px;width:100%;text-align:left;padding:11px 16px;background:var(--paper);border:none;border-left:5px solid transparent;border-radius:0;box-shadow:none;cursor:pointer;transition:background .12s}
.pick-item:hover{background:var(--surface);transform:none;box-shadow:none}
.pick-item:active{transform:translateX(1px);box-shadow:none}
.pick-item .pi-name{display:block;font-family:var(--osw);font-weight:600;font-size:18px;line-height:1.15;color:var(--ink)}
.pick-item .pi-meta{display:block;font-family:var(--ui);font-weight:500;font-size:15px;color:var(--muted);margin-top:2px}
.pick-item.active{background:rgba(232,78,16,.1);border-left-color:var(--brass)}
.pick-item.active .pi-name{color:var(--brass-hi)}
.gym-cap{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-top:10px;padding-top:11px;border-top:1px solid var(--line)}
.gym-cap .gc-src{font-family:var(--mono);font-size:15px;color:var(--faint)}
.gym-cap .gc-hint{font-family:var(--ui);font-weight:600;font-size:15px;color:var(--muted)}
.card{background:var(--paper);border:2px solid var(--ink);border-radius:5px;padding:clamp(18px,1.6vw,28px) clamp(20px,1.8vw,30px);margin-top:clamp(18px,1.8vw,28px);box-shadow:var(--shadow-lg)}
.card h2{font-family:var(--disp);font-size:var(--fs-cardtitle);color:var(--ink);font-weight:400;margin-bottom:7px;line-height:1.05;letter-spacing:-.5px}
.card h3{font-size:clamp(16px,1.1vw,19px);color:var(--ink);margin-bottom:4px}
.kicker{font-size:var(--fs-eyebrow);letter-spacing:.18em;text-transform:uppercase;color:var(--brass);font-weight:800;font-family:var(--ui)}
.sub{color:var(--muted);font-size:var(--fs-body)}
.row{display:flex;gap:14px;align-items:center;flex-wrap:wrap}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
@media(max-width:900px){.grid2,.grid3{grid-template-columns:1fr}}
.pill{display:inline-block;font-family:var(--mono);font-size:14px;border:1.5px solid var(--line2);border-radius:99px;
  padding:3px 12px;color:var(--muted);margin-right:6px;background:#fff}
.pill.gold{color:var(--brass);border-color:var(--brass);background:rgba(232,78,16,.07)}
.pill.teal{color:var(--blue);border-color:var(--blue);background:rgba(29,63,174,.06)}
hr.sep{border:none;border-top:1px dashed var(--line2);margin:14px 0}
.paper{background:var(--paper);border:2px solid var(--ink);border-radius:4px;padding:12px 14px 16px;margin-top:12px;overflow-x:auto;box-shadow:5px 5px 0 rgba(26,21,15,.85)}
/* ===== Branded chart card (Blue Note look) — matches our PNG renders ===== */
.chartcard{background:var(--paper);border:3px solid var(--ink);border-radius:8px;box-shadow:9px 9px 0 var(--ink);
  padding:18px 22px 14px;position:relative;transform-origin:top left}
.cc-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.cc-title{font-family:var(--disp);font-size:clamp(20px,2.1vw,34px);color:var(--ink);line-height:.95;text-transform:uppercase;letter-spacing:-.5px}
.cc-comp{font-family:var(--osw);font-weight:500;color:var(--muted);font-size:14px;margin-top:7px}
.cc-tag{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--brass);border:2px solid var(--brass);
  border-radius:6px;padding:4px 9px;white-space:nowrap;text-transform:uppercase;letter-spacing:.04em}
.cc-rule{height:5px;background:var(--brass);border-radius:2px;margin:11px 0 4px}
.cc-staff{overflow:hidden}
.cc-staff svg{display:block}
.cc-line svg{display:block;margin:0 auto}
.cc-line+.cc-line{margin-top:-22px}   /* compress the gap between systems (chords shifted down toward staff) */
.cc-staff text[data-name="chord"]{font-family:var(--osw)!important;font-weight:600!important;fill:var(--ink)!important}
.cc-foot{font-family:var(--disp);font-size:14px;letter-spacing:.03em;color:var(--ink);margin-top:6px;text-transform:uppercase}
.cc-fit{padding-bottom:12px}  /* room for the card's hard shadow when scaled */
.paper svg{max-width:100%;height:auto;display:block}
.chordchart{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:12px}
.ccbar{background:var(--paper);border:1.5px solid var(--ink);border-radius:3px;padding:10px 7px;text-align:center;
  font-family:var(--mono);font-size:clamp(15px,1.1vw,18px);font-weight:600;color:var(--ink);min-height:46px;position:relative;transition:all .12s}
.ccbar .barnum{position:absolute;top:3px;left:6px;font-size:11px;color:var(--faint)}
.ccbar.playing{background:var(--brass);border-color:var(--ink);color:#fff;transform:scale(1.06);box-shadow:2px 2px 0 var(--ink)}
.ccbar.sect-A{border-left:4px solid var(--ink)}
.ccbar.sect-B{border-left:4px solid var(--brass)}
.ccbar.sect-C{border-left:4px solid var(--blue)}
.ccbar.sect-D{border-left:4px solid var(--yellow)}
.ccbar.sect-I{border-left:4px solid var(--green)}
.ccbar.playing.sect-A,.ccbar.playing.sect-B,.ccbar.playing.sect-C,.ccbar.playing.sect-D,.ccbar.playing.sect-I{background:var(--brass);color:#fff}
/* ===== REEL STUDIO — canvas overlay for TikTok (records the canvas only; controls stay in margin) ===== */
#reel{position:fixed;inset:0;z-index:9999;background:#0c0c0c;display:none;justify-content:center;align-items:center;font-family:var(--ui)}
#reel.open{display:flex}
#reel-canvas{height:100vh;max-width:100vw;display:block;background:#00b140} /* #00b140 = chroma key green */
.reel-side{position:fixed;top:0;left:0;height:100vh;width:236px;z-index:5;background:rgba(18,16,13,.96);color:#f2ecdf;
  padding:16px 14px;display:flex;flex-direction:column;gap:9px;overflow:auto;box-shadow:4px 0 24px rgba(0,0,0,.5)}
.reel-side h4{font-family:var(--disp);font-size:14px;margin:2px 0 2px;color:#fff;text-transform:uppercase;letter-spacing:.04em}
.reel-side label{font-size:12px;display:flex;flex-direction:column;gap:3px;color:#cfc7b8}
.reel-side .ck{flex-direction:row;align-items:center;gap:6px}
.reel-side select,.reel-side input{font-family:var(--ui);font-size:13px;padding:5px 7px;border-radius:6px;border:1px solid #555;background:#fff;color:#111}
.reel-side .row{display:flex;gap:8px} .reel-side .row>label{flex:1}
.reel-side button{width:100%;margin-top:2px}
.reel-rec{color:#ff5252;font-size:12px;font-weight:800;display:none;align-items:center;gap:6px} .reel-rec.on{display:flex}
.reel-rec b{width:10px;height:10px;border-radius:50%;background:#ff3030;animation:reelblink 1s steps(1,end) infinite}
@keyframes reelblink{50%{opacity:.2}}
.reel-note{color:#8a8a8a;font-size:11px;line-height:1.4}
.reel-dialog{position:fixed;inset:0;z-index:20;background:rgba(0,0,0,.62);display:none;align-items:center;justify-content:center}
.reel-dialog.open{display:flex}
.reel-card{background:var(--paper);color:var(--ink);padding:22px 24px;border-radius:12px;box-shadow:0 0 0 4px var(--ink);max-width:360px;text-align:center}
.reel-card h3{font-family:var(--disp);margin:0 0 8px} .reel-card .row{display:flex;gap:10px;margin-top:14px;justify-content:center}
.reel-cal{position:fixed;inset:0;z-index:10000;background:#0c0c0c;display:none;flex-direction:column}
.reel-cal.open{display:flex}
.reel-cal-bar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;padding:10px 14px;background:#16130f;color:#f2ecdf;font-size:13px}
.reel-cal-bar b{color:#fff} .reel-cal-bar #cal-count{color:#e84e10;font-weight:700}
.reel-cal-main{flex:1;display:flex;min-height:0}
.reel-cal-stage{flex:1;overflow:auto;display:flex;justify-content:center;align-items:flex-start;padding:12px;background:#222}
#cal-canvas{cursor:crosshair;box-shadow:0 0 0 1px #555}
.reel-cal-side{width:252px;flex:0 0 auto;background:#16130f;color:#f2ecdf;padding:12px;overflow:auto;display:flex;flex-direction:column;gap:6px}
.reel-cal-side h5{font-family:var(--disp);font-size:13px;margin:0 0 2px;text-transform:uppercase;letter-spacing:.04em;color:#fff}
.cal-row{display:flex;align-items:center;gap:5px;font-size:12px}
.cal-row.rep{opacity:.92}
.cal-ix{width:24px;height:24px;border-radius:50%;background:#e84e10;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;flex:0 0 auto}
.cal-row .cal-lbl{flex:1;color:#cfc7b8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cal-row input.cal-m-in{width:40px;padding:3px;border-radius:5px;border:1px solid #555;background:#fff;color:#111;text-align:center;font-family:var(--mono);font-size:12px}
.cal-row button{width:24px;height:24px;padding:0;flex:0 0 auto;border-radius:5px;font-size:14px;line-height:1}
.cal-row .cal-del{color:#e0533a;border-color:#5c2b2e}
.cal-sum{margin-top:8px;font-family:var(--mono);font-size:13px;font-weight:700}
.cal-hint{color:#8a8a8a;font-size:11px;line-height:1.45;margin-top:2px}
/* key ring */
.keyring-host{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0}
.keybtn{font-family:var(--mono);min-width:44px}
.keybtn.mastered{border-color:var(--green);color:var(--green)}
/* TODAY: 6-block grid */
.blockgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:12px}
@media(max-width:980px){.blockgrid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:640px){.blockgrid{grid-template-columns:1fr}}
.blockcard{background:var(--paper);border:1.5px solid var(--ink);border-radius:8px;padding:14px;position:relative;
  display:flex;flex-direction:column;gap:8px;box-shadow:3px 3px 0 rgba(26,21,15,.85);transition:all .1s;cursor:pointer}
.blockcard:hover{transform:translate(-2px,-2px);box-shadow:5px 5px 0 rgba(26,21,15,.85)}
.bc-num{position:absolute;top:-12px;left:12px;background:var(--ink);color:var(--paper);font-family:var(--disp);
  font-size:14px;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.bc-num.done{background:var(--brass)}
.bc-head{display:flex;justify-content:space-between;align-items:baseline;gap:8px;margin-top:4px}
.bc-title{font-family:var(--disp);font-size:clamp(16px,1.2vw,20px);line-height:1.15}
.bc-min{font-family:var(--mono);font-size:14px;color:var(--brass);white-space:nowrap;font-weight:700}
.bc-blurb{color:var(--muted);font-size:15px;line-height:1.5;flex:1}
.bc-snap{font-family:var(--mono);font-size:14px}
.bc-snap .paper{margin-top:4px;padding:4px 6px 6px;box-shadow:none;border-width:1px}
.bc-glyph{font-size:21px;letter-spacing:.14em;color:var(--ink)}
.bc-foot{display:flex;justify-content:space-between;align-items:center}
.bc-done{color:var(--brass);font-weight:800;font-size:12px}
/* THE DAY'S RUN — full-bleed connected cells, the hour's blocks (done / now / next) */
#session-rail{max-width:var(--maxw);margin:9px auto 0;display:flex;gap:0;align-items:stretch;
  border:2px solid var(--ink);box-shadow:4px 4px 0 var(--ink);overflow:hidden;background:var(--paper)}
.run-cell{flex:1 1 0;min-width:0;display:flex;flex-direction:column;gap:6px;text-align:left;cursor:pointer;
  padding:clamp(8px,.7vw,13px) clamp(11px,1vw,18px);background:var(--paper);border:none;border-right:2px solid var(--ink);
  border-radius:0;box-shadow:none;transition:background .15s}
.run-cell:last-child{border-right:none}
.run-cell:hover{transform:none;box-shadow:none;background:var(--surface)}
.run-cell:active{transform:translateY(1px);box-shadow:none}
.run-cell .rc-top{display:flex;align-items:center;gap:9px}
.run-cell .rc-num{display:inline-flex;align-items:center;justify-content:center;width:clamp(22px,1.7vw,28px);height:clamp(22px,1.7vw,28px);
  border-radius:50%;border:2px solid var(--ink);background:var(--paper);color:var(--ink);
  font-family:var(--mono);font-weight:700;font-size:clamp(13px,.95vw,16px);flex:none}
.run-cell .rc-min{font-family:var(--mono);font-weight:700;font-size:clamp(13px,.95vw,16px);color:var(--muted)}
.run-cell .rc-name{font-family:var(--osw);font-weight:600;text-transform:uppercase;letter-spacing:.3px;line-height:1.1;
  font-size:clamp(13px,1vw,18px);color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.run-cell.done{background:rgba(232,78,16,.12)}
.run-cell.done .rc-num{background:var(--brass);border-color:var(--brass);color:#fff}
.run-cell.now{background:var(--brass)}
.run-cell.now .rc-num{background:var(--paper);border-color:var(--paper);color:var(--brass)}
.run-cell.now .rc-min{color:#fff3ea}
.run-cell.now .rc-name{color:#fff}
@media(max-width:760px){.run-cell .rc-name{display:none}}
/* FOCUS MODE — full-screen guided session */
#focus{position:fixed;inset:0;z-index:357;display:none;flex-direction:column;background:var(--bg)}
#focus.open{display:flex}
#focus-top{display:flex;align-items:center;gap:16px;flex-wrap:wrap;padding:14px 24px;border-bottom:3px solid var(--ink);
  background:rgba(250,246,236,.96);backdrop-filter:blur(10px)}
#focus-time{font-family:var(--mono);font-size:44px;font-weight:700;color:var(--brass);min-width:138px;line-height:1}
#focus-meta{flex:1;min-width:230px}
#focus-title{font-family:var(--disp);font-size:clamp(21px,1.9vw,30px);font-weight:700;color:var(--ink)}
#focus-bar{height:6px;background:var(--surface3);border-radius:3px;overflow:hidden;margin-top:7px}
#focus-fill{height:100%;background:var(--brass);width:0%}
#focus-body{overflow-y:auto;flex:1;width:100%}
#focus-inner{max-width:920px;margin:0 auto;padding:18px 22px 80px}
#focus-why{border-left:4px solid var(--brass);padding:4px 0 4px 14px;color:var(--muted);font-style:italic;font-size:16px;margin-bottom:6px}
.focus-next-hint{color:var(--faint);font-size:14px;font-family:var(--mono);margin-top:18px;text-align:center}
.cyc-strip{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px}
/* SHEET MUSIC — fills from below the frozen masthead to the bottom of the viewport, any browser/laptop.
   Portrait charts become height-bound (top-to-bottom); wide charts cap at the column width. Never tiny, never overlapping. */
.bookpage{max-height:calc(100dvh - var(--head-h) - 34px);width:auto;height:auto;max-width:100%;
  border:2px solid var(--ink);border-radius:4px;box-shadow:5px 5px 0 rgba(26,21,15,.85);display:block;margin:0 auto;background:var(--paper)}
/* in the full-screen guided session, also leave room for the focus header bar */
#focus .bookpage{max-height:calc(100dvh - var(--head-h) - 104px)}
.qr-host svg{border:6px solid #fff;border-radius:10px;box-shadow:var(--shadow)}
/* checklist */
.check{display:flex;gap:10px;align-items:flex-start;padding:7px 0;border-bottom:1px dashed var(--line);cursor:pointer}
.check:last-child{border-bottom:none}
.checkbox{width:19px;height:19px;border:1.5px solid var(--line2);border-radius:5px;flex-shrink:0;margin-top:1px;
  display:flex;align-items:center;justify-content:center;font-size:13px;color:#1a1408;font-weight:800}
.check.done .checkbox{background:var(--green);border-color:var(--green)}
.check.done .ck-label{color:var(--muted);text-decoration:line-through}
/* blocks on Today */
.block{display:flex;gap:14px;padding:13px 0;border-bottom:1px dashed var(--line);align-items:flex-start}
.block:last-child{border-bottom:none}
.block-min{font-family:var(--mono);font-size:13px;color:var(--brass);border:1px solid var(--brass-dim);
  border-radius:8px;padding:6px 8px;min-width:52px;text-align:center;flex-shrink:0;margin-top:2px}
.block h3{font-size:clamp(16px,1.1vw,19px)}
.block .why{color:var(--muted);font-size:15px;font-style:italic}
/* tune cards */
.tunegrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px;margin-top:14px}
.tunecard{background:var(--paper);border:2px solid var(--ink);border-radius:4px;padding:16px;cursor:pointer;transition:all .12s;box-shadow:4px 4px 0 rgba(26,21,15,.85)}
.tunecard:hover{transform:translate(-2px,-2px);box-shadow:6px 6px 0 rgba(26,21,15,.85)}
.tunecard h3{font-size:clamp(17px,1.3vw,21px)}
.tc-meta{font-family:var(--mono);font-size:14px;color:var(--muted);margin-top:4px}
.tc-status{display:flex;gap:4px;margin-top:9px}
.tc-dot{width:10px;height:10px;border-radius:3px;background:var(--surface3);border:1px solid var(--line)}
.tc-dot.on{background:var(--green);border-color:var(--green)}
/* progress */
.statbig{font-family:var(--mono);font-size:34px;font-weight:700;color:var(--brass-hi)}
.statlabel{font-size:14px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
.heat{display:grid;gap:3px;margin-top:10px}
.heatcell{width:100%;aspect-ratio:1;border-radius:3px;background:var(--surface3);border:1px solid rgba(255,255,255,.04)}
.heatcell.on{background:var(--green)}
.heatcell.half{background:var(--brass-dim)}
table.tbl{width:100%;border-collapse:collapse;font-size:15px;margin-top:10px}
table.tbl th{text-align:left;color:var(--brass);font-size:13px;letter-spacing:.1em;text-transform:uppercase;padding:8px;border-bottom:1.5px solid var(--ink)}
table.tbl td{padding:8px;border-bottom:1px dashed var(--line);vertical-align:top}
/* video embeds */
.vidwrap{position:relative;width:100%;aspect-ratio:16/9;border-radius:10px;overflow:hidden;background:#000;margin-top:10px}
.vidwrap iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
.vid-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
/* modal */
.modal{position:fixed;inset:0;z-index:400;background:rgba(20,30,55,.5);display:none;align-items:center;justify-content:center;padding:20px}
.modal.open{display:flex}
.modal-box{background:var(--surface);border:2.5px solid var(--ink);border-radius:6px;max-width:min(1400px,96vw);width:100%;
  max-height:94vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:var(--shadow-lg)}
.modal-head{display:flex;align-items:center;gap:12px;padding:13px 18px;border-bottom:2px solid var(--ink);flex-wrap:wrap}
.modal-body{overflow:auto;flex:1;display:flex;align-items:flex-start;justify-content:center;background:var(--surface3);padding:10px}
#pdf-canvas{max-width:100%;box-shadow:var(--shadow-lg)}
/* toast */
#toasts{position:fixed;bottom:88px;right:20px;z-index:500;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--paper);border:2px solid var(--ink);border-left:5px solid var(--brass);border-radius:5px;padding:11px 17px;font-size:15px;
  animation:fadein .2s;max-width:320px;box-shadow:4px 4px 0 rgba(26,21,15,.85);color:var(--ink)}
/* misc */
.bignote{font-family:var(--disp);font-size:17px;line-height:1.6;color:var(--cream)}
.lorecard{border-left:3px solid var(--brass);padding-left:14px}
kbd{font-family:var(--mono);font-size:11px;background:#fff;border:1px solid var(--line2);border-bottom-width:2px;border-radius:5px;padding:1px 6px}
.score-ring{transform:rotate(-90deg)}
.mixer{display:flex;gap:16px;flex-wrap:wrap;margin-top:8px}
.mixer label{display:flex;flex-direction:column;font-size:11px;color:var(--muted);gap:3px;font-family:var(--mono)}
.mixer input[type=range]{width:90px}
details{margin-top:10px} summary{cursor:pointer;color:var(--brass-hi);font-weight:600;font-size:15px}
summary::-webkit-details-marker{display:none} .rail-card summary{margin-top:0}
.footer-note{text-align:center;color:var(--faint);font-size:14px;margin-top:40px;font-family:var(--mono)}
/* ===== keep the frozen masthead SHORT on laptops (it must not eat the viewport) ===== */
@media(max-width:1400px){
  #tb-row{gap:6px 9px}
  #tb-row button{padding:5px 9px;font-size:13.5px}
  #bpm-slider{width:clamp(76px,6vw,120px)}
}
@media(max-width:1080px){
  /* fold the broadsheet + gym columns to a single readable column earlier */
  .bs-grid,.gym-grid{grid-template-columns:1fr}
  .gym-aside{position:static}
}
@media(max-width:700px){
  #bpm-slider{width:80px} #tuner-meter{width:170px}
  .chordchart{grid-template-columns:repeat(2,1fr)}
  #runner-time{font-size:30px;min-width:100px}
  :root{--gut:14px}
  .navbtn{font-size:15px}
}
/* ============ THE WORLD — quiet desert horizon behind everything ============
   Flat vector (clip-path silhouettes), warm scene earth-tones only, low prominence.
   Still by default; it only breathes while the metronome runs (--play-state),
   and freezes entirely for prefers-reduced-motion. Never sits under reading columns
   (confined to the bottom band + right margin) and never eats clicks. */
#ws-world{position:fixed;left:0;right:0;bottom:0;height:min(34vh,300px);z-index:0;pointer-events:none;
  overflow:hidden;opacity:var(--world-op)}
#ws-world .ws-mtn,#ws-world .ws-dune,#ws-world .ws-pine{position:absolute;bottom:30px}
#ws-world .ws-mtn{left:0;width:min(46vw,560px);height:clamp(110px,18vh,180px);background:#dbcfb6;
  clip-path:polygon(0% 100%,0% 30%,14% 10%,28% 34%,44% 20%,60% 46%,76% 66%,90% 86%,100% 100%)}
#ws-world .ws-mtn.near{width:min(36vw,440px);height:clamp(118px,19vh,190px);background:#ae9468;opacity:.5;
  clip-path:polygon(0% 100%,0% 18%,12% 0%,26% 26%,42% 12%,58% 40%,74% 62%,88% 86%,97% 100%)}
#ws-world .ws-dune{left:0;right:0;width:auto;height:54px;background:#e4d8c0;opacity:.9;
  clip-path:polygon(0 100%,0 58%,22% 48%,46% 62%,68% 46%,86% 60%,100% 50%,100% 100%)}
#ws-world .ws-dune.lo{height:36px;background:#cbb994;opacity:.85;
  clip-path:polygon(0 100%,0 64%,28% 54%,52% 70%,76% 54%,100% 64%,100% 100%)}
#ws-world .ws-pine{right:2vw;width:clamp(150px,18vw,250px);height:clamp(170px,28vh,270px);transform-origin:bottom center;
  animation:ws-treeshake var(--beat-ms) infinite;animation-play-state:var(--play-state)}
#ws-world .ws-pine .foliage{position:absolute;left:0;bottom:42px;width:100%;height:calc(100% - 42px);background:#34402e;opacity:.42;
  clip-path:polygon(50% 0%,62% 16%,55% 16%,68% 34%,60% 34%,76% 54%,66% 54%,84% 76%,72% 76%,94% 100%,6% 100%,28% 76%,16% 76%,34% 54%,24% 54%,40% 34%,32% 34%,45% 16%,38% 16%)}
#ws-world .ws-pine .trunk{position:absolute;left:calc(50% - 8px);bottom:0;width:16px;height:52px;background:#4a3826;opacity:.5}
/* metronome road — the footer rule with a travelling orange sweeper, on the beat */
#ws-road{position:fixed;left:0;right:0;bottom:0;height:6px;z-index:1;pointer-events:none;background:var(--line);opacity:.5}
#ws-road i{position:absolute;top:-2px;width:9%;height:10px;background:var(--brass);opacity:.55;
  animation:ws-metro var(--beat-ms) ease-in-out infinite alternate;animation-play-state:var(--play-state)}
@keyframes ws-treeshake{0%{transform:translateX(0) rotate(0)}7%{transform:translateX(2px) rotate(.35deg)}16%{transform:translateX(-1.4px) rotate(-.28deg)}26%{transform:translateX(.8px) rotate(.12deg)}36%,100%{transform:translateX(0) rotate(0)}}
@keyframes ws-metro{from{left:2.5%}to{left:89%}}
@media(prefers-reduced-motion:reduce){
  #ws-world .ws-pine,#ws-road i{animation:none!important}
}
/* on laptops/tablets there's less margin, so keep the world quieter and drop the right-margin pine */
@media(max-width:1100px){ :root{--world-op:.26} #ws-world .ws-pine{display:none} }
</style>

<body>

<!-- ================= THE WORLD (ambient, behind everything) ================= -->
<div id="ws-world" aria-hidden="true">
  <div class="ws-mtn"></div>
  <div class="ws-mtn near"></div>
  <div class="ws-dune"></div>
  <div class="ws-dune lo"></div>
  <div class="ws-pine"><div class="foliage"></div><div class="trunk"></div></div>
</div>
<div id="ws-road" aria-hidden="true"><i></i></div>

<script>
'use strict';
/* ==================== THEORY CORE ==================== */
const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];
const SHARPS=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const FLATS =['C','Db','D','Eb','E','F','Gb','G','Ab','A','Bb','B'];
const LETTER_PC={C:0,D:2,E:4,F:5,G:7,A:9,B:11};
const FLAT_KEYS=new Set([5,10,3,8,1,6,0]); // F Bb Eb Ab Db Gb (+C neutral-flats for jazz)
const CYCLE4=[0,5,10,3,8,1,6,11,4,9,2,7]; // circle of fourths from C
const pcName=(pc,flats=true)=>(flats?FLATS:SHARPS)[((pc%12)+12)%12];
const mod12=n=>((n%12)+12)%12;
// pretty chord text
function pretty(s){return s.replace(/b/g,'♭').replace(/#/g,'♯').replace(/maj7/g,'△').replace(/m7b5|♭5/g,m=>m==='m7b5'?'ø7':m).replace(/dim7/g,'°7').replace(/mM7/g,'-△7').replace(/m7/g,'-7').replace(/m6/g,'-6');}
// --- key signatures (major) ---
const SIG_COUNT={0:0,7:1,2:2,9:3,4:4,11:5,6:-6,5:-1,10:-2,3:-3,8:-4,1:-5};
const SHARP_ORDER=['F','C','G','D','A','E','B'], FLAT_ORDER=['B','E','A','D','G','C','F'];
function keySig(pc,minor=false){ const maj=minor?mod12(pc+3):pc; let n=SIG_COUNT[maj]; const acc={};
  if(n>0) SHARP_ORDER.slice(0,n).forEach(L=>acc[L]='#'); else if(n<0) FLAT_ORDER.slice(0,-n).forEach(L=>acc[L]='b');
  return acc;}
function keyLabel(pc,minor=false){ const flats=FLAT_KEYS.has(minor?mod12(pc+3):pc)||SIG_COUNT[minor?mod12(pc+3):pc]<0; return pcName(pc,flats)+(minor?'m':'');}
// spell a midi note within a key context → {L, acc('','#','b'), oct}
function spell(midi,keyPc,minor=false){
  const sig=keySig(keyPc,minor); const flats=Object.values(sig).includes('b')||(Object.keys(sig).length===0&&!minor);
  const pc=mod12(midi); const isLeading=minor&&mod12(pc-keyPc)===11;
  // candidates: natural, sharp-of-lower, flat-of-upper
  const cands=[];
  for(const [L,lpc] of Object.entries(LETTER_PC)){
    for(const [acc,off] of [['',0],['#',1],['b',-1]]){
      if(mod12(lpc+off)===pc) cands.push({L,acc,off});
    }}
  // scoring: prefer in-sig spelling, then natural, then key's flat/sharp preference
  cands.forEach(c=>{ c.score=0;
    if((sig[c.L]||'')===c.acc) c.score+=4;           // matches key signature exactly
    if(isLeading&&(c.acc==='#'||(c.acc===''&&!flats))) c.score+=5; // minor leading tone spelled sharp
    if(c.acc==='') c.score+=3;
    if(c.acc==='b'&&flats) c.score+=2;
    if(c.acc==='#'&&!flats) c.score+=2;
    if(c.acc==='#'&&flats) c.score-=1;
    if(c.acc==='b'&&!flats) c.score-=1;
    if((c.L==='C'&&c.acc==='b')||(c.L==='F'&&c.acc==='b')||(c.L==='B'&&c.acc==='#')||(c.L==='E'&&c.acc==='#')) c.score-=3;
  });
  cands.sort((a,b)=>b.score-a.score); const c=cands[0];
  const oct=Math.floor((midi-c.off-LETTER_PC[c.L])/12)-1;
  return {L:c.L,acc:c.acc,oct};
}
function abcPitch(sp){ let s=sp.L; if(sp.oct>=5){s=s.toLowerCase(); for(let i=6;i<=sp.oct;i++)s+="'";} else {for(let i=3;i>=sp.oct;i--)s+=",";} return s;}
// --- rhythm patterns: [offsetUnits, durUnits] in 8th-note units; beatSpan ---
const PAT={
  '4':{span:1,n:[[0,2]]}, '2':{span:2,n:[[0,4]]}, '2.':{span:3,n:[[0,6]]}, '1':{span:4,n:[[0,8]]},
  '88':{span:1,n:[[0,1],[1,1]]},
  'ttt':{span:1,n:[[0,2/3],[2/3,2/3],[4/3,2/3]],trip:true},
  'ssss':{span:1,n:[[0,.5],[.5,.5],[1,.5],[1.5,.5]]},
  '8ss':{span:1,n:[[0,1],[1,.5],[1.5,.5]]},
  'ss8':{span:1,n:[[0,.5],[.5,.5],[1,1]]},
  'd8s':{span:1,n:[[0,1.5],[1.5,.5]]},
  'r8':{span:1,n:[[1,1]],rest:[[0,1]]},
  'r4':{span:1,n:[],rest:[[0,2]]},
  'r2':{span:2,n:[],rest:[[0,4]]},
  'tt_':{span:1,n:[[0,2/3],[2/3,4/3]],trip:true}, // triplet: 2 notes (short-long)
  '_tt':{span:1,n:[[0,4/3],[4/3,2/3]],trip:true}, // triplet: long-short
  'x6':{span:1,n:[[0,1/3],[1/3,1/3],[2/3,1/3],[1,1/3],[4/3,1/3],[5/3,1/3]],trip:true} // 16th-note triplets (sextuplet)
};
const DUR_ABC=u=>u===2?'2':u===4?'4':u===6?'6':u===8?'8':u===1?'':u===.5?'/':u===1.5?'3/2':u===2/3?'':u===4/3?'2':'';
// roman tokens → {semis, suffix}
const ROMAN={'I△':[0,'maj7'],'I6':[0,'6'],'I7':[0,'7'],'ii-7':[2,'m7'],'iiø':[2,'m7b5'],'V7':[7,'7'],'V7b9':[7,'7b9'],'V7alt':[7,'7alt'],
 'i-':[0,'m6'],'i-△':[0,'mM7'],'IV7':[5,'7'],'VI7':[9,'7b9'],'vi-7':[9,'m7'],'II7':[2,'7'],'bVII7':[10,'7'],'#io':[1,'dim7'],'IVo':[5,'dim7'],'V/ii':[9,'7'],
 'bIII7':[3,'7'],'bII7':[1,'7']};
function realizeRoman(tok,keyPc,flats){const r=ROMAN[tok]; if(!r) return tok;
  return pcName(mod12(keyPc+r[0]),flats)+r[1];}
// --- chord parser ---
const CHORD_TYPES={
 'maj7':{iv:[0,4,7,11],sc:[0,2,4,5,7,9,11],gt:[4,11]},
 '6':{iv:[0,4,7,9],sc:[0,2,4,5,7,9,11],gt:[4,9]},
 '7':{iv:[0,4,7,10],sc:[0,2,4,5,7,9,10],gt:[4,10]},
 '7b9':{iv:[0,4,7,10],sc:[0,1,4,5,7,8,10],gt:[4,10]},
 '7alt':{iv:[0,4,8,10],sc:[0,1,3,4,6,8,10],gt:[4,10]},
 '7#11':{iv:[0,4,7,10],sc:[0,2,4,6,7,9,10],gt:[4,10]},
 '7sus':{iv:[0,5,7,10],sc:[0,2,5,7,9,10],gt:[5,10]},
 'm7':{iv:[0,3,7,10],sc:[0,2,3,5,7,9,10],gt:[3,10]},
 'm6':{iv:[0,3,7,9],sc:[0,2,3,5,7,9,11],gt:[3,9]},
 'mM7':{iv:[0,3,7,11],sc:[0,2,3,5,7,9,11],gt:[3,11]},
 'm7b5':{iv:[0,3,6,10],sc:[0,2,3,5,6,8,10],gt:[3,10]},
 'dim7':{iv:[0,3,6,9],sc:[0,2,3,5,6,8,9,11],gt:[3,9]},
};
const SUFFIX_MAP=[[/^(maj7|△7?|M7|ma7|maj9)/,'maj7'],[/^(69|6\/9|6)/,'6'],[/^(m7b5|-7b5|ø7?|m7♭5)/,'m7b5'],[/^(dim7|dim|o7|°7?|o)/,'dim7'],
 [/^(mM7|m\(maj7\)|-△7?|minmaj7|m maj7)/,'mM7'],[/^(m6|-6)/,'m6'],[/^(m7|m9|m11|-7|-9|min7|mi7|-)/,'m7'],[/^m$/,'m7'],
 [/^(7alt|7#5|7\+5?|aug7|\+7?)/,'7alt'],[/^(7b9|7♭9|7b13|7#9|7♯9)/,'7b9'],[/^(7#11|7♯11|9#11)/,'7#11'],[/^(7sus4?|sus4?7?|sus)/,'7sus'],
 [/^(13|9|7)/,'7'],[/^$/,'6']];
function parseChord(sym){
  const m=sym.trim().match(/^([A-G])([#b♯♭]?)(.*)$/); if(!m) return null;
  let root=LETTER_PC[m[1]]; if(m[2]==='#'||m[2]==='♯')root++; if(m[2]==='b'||m[2]==='♭')root--;
  root=mod12(root); let suf=m[3].replace(/\(|\)/g,'').trim(); let type='7';
  for(const [re,t] of SUFFIX_MAP){ if(re.test(suf)){type=t;break;} }
  const T=CHORD_TYPES[type];
  return {root, type, sym, iv:T.iv, sc:T.sc, gt:T.gt};
}
function transposeSym(sym,semis,flats){
  const m=sym.trim().match(/^([A-G])([#b♯♭]?)(.*)$/); if(!m) return sym;
  let pc=LETTER_PC[m[1]]; if(m[2]==='#'||m[2]==='♯')pc++; if(m[2]==='b'||m[2]==='♭')pc--;
  // Enharmonic policy (wood-22): a caller may force a flats preference; otherwise PRESERVE the
  // source root's accidental DIRECTION so a context-spelled sharp stays sharp through transposition
  // (F#→G#) instead of being flattened to Gb/Ab — e.g. the ♯I° F#dim7 in Miss Jones, the E-major-
  // bridge F#m7b5 in ATTYA, the book-verified F♯ø/G♯ø in Footprints — while flat roots (e.g.
  // Recorda Me's descending Bb→Ab→Gb→F chain) stay flat. Natural roots keep the long-standing flat
  // default. Pitch is unaffected (parseChord treats #/♭ alike); ABC key sigs + note spelling come
  // from pcName(keyPc)/spell(), never from here — so transposition/key-sigs cannot break.
  if(flats===undefined){
    const srcSharp=(m[2]==='#'||m[2]==='♯');
    // A#/D# are near-always mis-spellings here (Bb/Eb are standard) → normalize to flat even if
    // the source typo'd them; F#/C#/G# are legitimate sharp-context roots → preserve.
    flats=!(srcSharp && m[1]!=='A' && m[1]!=='D');
  }
  return pcName(mod12(pc+semis),flats)+m[3];
}
/* --- LICK COMPILER: lick beats → {events, abc} in any key --- */
const RANGE_LO=54, RANGE_HI=82; // written F#3..Bb5 (his comfortable ceiling)
function compileLick(lick,keyPc,opts={}){
  const minor=!!lick.minor;
  // gather raw offsets
  const offs=[]; lick.beats.forEach(b=>{(b.n||[]).forEach(o=>offs.push(o));});
  let best=null;
  for(const base of [36+keyPc,48+keyPc,60+keyPc,72+keyPc]){
    const ms=offs.map(o=>base+o); const lo=Math.min(...ms),hi=Math.max(...ms);
    if(lo<RANGE_LO||hi>RANGE_HI) continue;
    const center=(lo+hi)/2, pen=Math.abs(center-67);
    if(!best||pen<best.pen) best={base,pen};
  }
  if(!best){ // forced fit: clamp to whichever base violates least
    let bb=null;
    for(const base of [36+keyPc,48+keyPc,60+keyPc,72+keyPc]){
      const ms=offs.map(o=>base+o); const v=Math.max(0,RANGE_LO-Math.min(...ms))+Math.max(0,Math.max(...ms)-RANGE_HI);
      if(!bb||v<bb.v) bb={base,v};}
    best=bb;
  }
  let base=best.base;
  if(opts.high){ for(const b2 of [72+keyPc,60+keyPc,48+keyPc]){ const ms=offs.map(o=>b2+o);
      if(Math.min(...ms)>=RANGE_LO&&Math.max(...ms)<=RANGE_HI){ base=b2; break; } } }
  if(opts.baseLock!==undefined) base=opts.baseLock;
  const flats=Object.values(keySig(keyPc,minor)).includes('b')||SIG_COUNT[minor?mod12(keyPc+3):keyPc]===0&&true;
  // events
  const events=[]; let beat=0;
  const measureLen=4;
  lick.beats.forEach(b=>{const P=PAT[b.p]; (P.n).forEach((nd,i)=>{ const o=b.n[i]; if(o===undefined||o===null)return;
      events.push({t:beat+nd[0]/2, dur:nd[1]/2, midi:base+o, trip:!!P.trip});});
    beat+=P.span;});
  const totalBeats=beat;
  // chords map beat→symbol (pretty for notation, plain for the pad synth)
  const chordAt={}; const chordList=[];
  (lick.chords||[]).forEach(([bt,tok])=>{ const plain=realizeRoman(tok,keyPc,flats);
    chordAt[bt]=pretty(plain); chordList.push({t:bt,sym:plain}); });
  // ABC build
  let abc=`X:1\nL:1/8\nM:4/4\nK:${pcName(keyPc,flats).replace('b','_').replace('#','^')}${minor?'min':''}\n`;
  // abcjs wants Bb as "Bb", not "B_": fix key field
  abc=abc.replace(/K:([A-G])[_]/,'K:$1b').replace(/K:([A-G])[\^]/,'K:$1#');
  let bar=''; let inBeat=0; let measAcc={}; let out=[];
  beat=0;
  lick.beats.forEach(b=>{const P=PAT[b.p]; let grp='';
    if(chordAt[beat]!==undefined) grp+=`"${chordAt[beat]}"`;
    if(P.rest&&P.n.length===0){ grp+='z'+DUR_ABC(P.rest[0][1]); }
    else{
      if(P.rest) grp+='z';
      if(P.trip&&P.n.length===3) grp+='(3';
      if(P.trip&&P.n.length===2) grp+='(3:2:2';
      if(P.trip&&P.n.length===6) grp+='(6:4:6';
      P.n.forEach((nd,i)=>{ const o=b.n[i]; if(o===undefined||o===null){grp+='z';return;}
        const midi=base+o; const sp=spell(midi,keyPc,minor);
        const sigA=keySig(keyPc,minor)[sp.L]||''; const k=sp.L+sp.oct;
        const eff=(k in measAcc)?measAcc[k]:sigA;
        let accSym='';
        if(sp.acc!==eff){ accSym=sp.acc===''?'=':(sp.acc==='#'?'^':'_'); measAcc[k]=sp.acc; }
        let durS; const u=nd[1];
        if(P.trip) durS=(u===4/3?'2':'');
        else durS=DUR_ABC(u);
        grp+=accSym+abcPitch(sp)+durS;
      });
    }
    out.push(grp);
    beat+=P.span; inBeat+=P.span;
    if(inBeat>=measureLen){ out.push('|'); inBeat=0; measAcc={}; }
  });
  abc+=out.join(' ')+(inBeat>0?' |':'')+']\n';

}
function renderABC(el,abc,scale=1.05,opts={}){
  const w=el.clientWidth>60?Math.min(620,el.clientWidth-26):500;
  const mpl=opts.measuresPerLine||4;
  const cfg={scale,staffwidth:w,paddingtop:14,paddingbottom:22,paddingleft:4,paddingright:4,foregroundColor:'#1d1a14',selectTypes:false,wrap:{minSpacing:1.4,maxSpacing:2.8,preferredMeasuresPerLine:mpl}};
  if(opts.responsive) cfg.responsive='resize'; // viewBox-scale the SVG to the container width: fits, no right-overflow, no scroll, height grows
  try{ ABCJS.renderAbc(el,abc,cfg);}
  catch(e){ el.innerHTML='<div style="color:#1d1a14;font-family:monospace;font-size:12px;padding:8px">'+abc.replace(/</g,'&lt;')+'</div>'; }
}
/* --- date engine --- */
const EPOCH=new Date(2026,0,5); // Monday
function dayInfo(d=new Date()){
  const day0=new Date(d.getFullYear(),d.getMonth(),d.getDate());
  const dayIdx=Math.max(0,Math.round((day0-EPOCH)/864e5));
  const weekIdx=Math.floor(dayIdx/7), dow=dayIdx%7; // 0=Mon
  return {dayIdx,weekIdx,dow,date:day0};
}
const DOW_NAMES=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
/* ==================== VOCABULARY: 18 LICKS ==================== */
/* offsets are semitones from the I-tonic (or i, or blues I7). p = rhythm pattern per beat. */
/* ==================== VOCABULARY: REAL TRANSCRIBED LICKS (Weimar Jazz Database) ==================== */
/* Pitches are exact note-level transcriptions of recorded solos; rhythm quantized to the app grid.
   Offsets are semitones from the I root. Generated by tools/wjazz_extract.py — see A4-WJAZZ-CANDIDATES.json. */

function fundRange(top){ // ascending arc to today's target note, rest, down — range built on air
  const ups=[0,4,7,12,16,19,21,22].filter(x=>x<=top);
  const beats=ups.map(o=>({p:'4',n:[o]}));
  beats.push({p:'2',n:[top]},{p:'r2'});
  [...ups].reverse().slice(1).forEach(o=>beats.push({p:'4',n:[o]}));
  beats.push({p:'1',n:[0]});
  return {beats,minor:false,name:'Range arc',chords:[]};
}

const AC={ctx:null,
  get(){ if(!this.ctx){ this.ctx=new (window.AudioContext||window.webkitAudioContext)();
    this.comp=this.ctx.createDynamicsCompressor(); this.comp.threshold.value=-12; this.comp.ratio.value=4;
    this.master=this.ctx.createGain(); this.master.gain.value=.9;
    this.master.connect(this.comp); this.comp.connect(this.ctx.destination);}
    if(this.ctx.state==='suspended') this.ctx.resume();
    return this.ctx;},
  out(){ this.get(); return this.master;},
  verb(){ // shared reverb send — generated impulse, makes everything sit in a room
    const ctx=this.get();
    if(!this._verb){ const len=Math.floor(ctx.sampleRate*1.8);
      const ir=ctx.createBuffer(2,len,ctx.sampleRate);
      for(let ch=0;ch<2;ch++){ const d=ir.getChannelData(ch);
        for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/len,2.6)*0.5; }
      const conv=ctx.createConvolver(); conv.buffer=ir;
      const g=ctx.createGain(); g.gain.value=.85;
      conv.connect(g); g.connect(this.master);
      this._verb=ctx.createGain(); this._verb.gain.value=1; this._verb.connect(conv);}
    return this._verb;}
};

  /* Preload the soundfont instruments AHEAD of play (call on tune-open). soundfont-player loads

  ensure(){ if(this.ready||this.loading||!this.enabled) return;

  async load(){ if(this.ready||this.loading||!this.enabled||typeof Soundfont==='undefined') return;
    this.loading=true; const ac=AC.get();

    // try FluidR3_GM first (woodier bass / electric keys / real kit), fall back to MusyngKite, then synth.
    const get=async(name,sf)=>{ try{ return await Soundfont.instrument(ac,name,{destination:AC.out(),soundfont:sf}); }catch(e){ return null; } };
    const load1=async(name,primary)=>{ const alt=primary==='MusyngKite'?'FluidR3_GM':'MusyngKite'; return (await get(name,primary))||(await get(name,alt)); };
    this.piano=await load1('acoustic_grand_piano','MusyngKite'); // warm grand (FluidR3's grand is bright/harpsichord-like)

    this.loading=false; },

/* ===== Real recorded drum loop. When a loop file is present it REPLACES the generated drums and is
   tempo-matched to each tune via playbackRate + started on the downbeat. Falls back to the synth/GM kit
   if no loop loads. Drop loop file(s) in Projects/Trumpet/lib/drums/ and list them in `manifest`
   (url + the loop's actual bpm). Multiple entries -> nearest-tempo is picked, with a small rate trim. ===== */
/* Multi-track real-drum engine. Tracks come from window.DRUM_TRACKS (drums-manifest.js).
   Per-tune choice (auto / synth / specific track) persists in localStorage. When a real track
   is the resolved target AND its audio is decoded, Band.drum() mutes the synth kit and a
   sample-accurate Web Audio BufferSource plays the recording: start(downbeat, leadIn+nudge),
   playbackRate = songBpm/trackBpm (tempo-follow), looped. Decode happens ahead of time
   (on selection/render); until a buffer is ready `active` is false so the synth kit covers
   that take (no mid-bar swap). Picking a track also sets the band's bass/comp STYLE.
   Per-track `nudge` (ms) lets you lock the downbeat by ear; it's remembered. */
const DrumLoop={
  enabled:true, pending:null, target:null, src:null, gain:null, bufs:{}, _decoding:{},
  choices:(()=>{ try{return JSON.parse(localStorage.getItem('woodshed_drums')||'{}');}catch(e){return {};} })(),
  nudges:(()=>{ try{return JSON.parse(localStorage.getItem('woodshed_drumnudge')||'{}');}catch(e){return {};} })(),
  tracks(){ return window.DRUM_TRACKS||[]; },
  byId(id){ return this.tracks().find(t=>t.id===id)||null; },
  _compat(ts,ss){ if(ss==='swing'||ss==='ballad') return ts==='swing'||ts==='ballad';
    if(ss==='bossa') return ts==='bossa'||ts==='latin';
    if(ss==='latin') return ts==='latin'||ts==='bossa';
    if(ss==='funk') return ts==='funk';
    if(ss==='waltz6') return ts==='waltz6'; return ts==='swing'; },
  propose(style,bpm){ const c=this.tracks().filter(t=>this._compat(t.style,style)); if(!c.length) return null;
    const best=c.reduce((a,b)=>Math.abs(b.bpm-bpm)<Math.abs(a.bpm-bpm)?b:a);
    if(style==='ballad'){ const r=bpm/best.bpm; if(r<0.7||r>1.4) return null; } // too big a stretch sounds bad
    return best; },
  resolve(tuneId,style,bpm){ const ch=this.choices[tuneId];
    if(ch==='synth') return null;
    if(ch&&ch!=='auto'){ const t=this.byId(ch); if(t) return t; }
    return this.propose(style,bpm); },
  setChoice(tuneId,val){ this.choices[tuneId]=val; try{localStorage.setItem('woodshed_drums',JSON.stringify(this.choices));}catch(e){} },
  getNudge(id){ return +this.nudges[id]||0; },
  setNudge(id,ms){ this.nudges[id]=+ms||0; try{localStorage.setItem('woodshed_drumnudge',JSON.stringify(this.nudges));}catch(e){} },
  /* fetch + decode a track's audio ahead of time; keep only one buffer in memory (long files). */
  ensure(track){ if(!track) return Promise.resolve(null);

    outBars.push([sym]);                           // band comps one chord per bar of the cell

function copyText(t){ try{ if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(t).then(()=>toast('Copied day log (markdown)')).catch(()=>_copyFallback(t)); } else _copyFallback(t); }catch(e){ _copyFallback(t); } }
function _copyFallback(t){ try{ const ta=document.createElement('textarea'); ta.value=t; ta.style.position='fixed'; ta.style.opacity='0'; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove(); toast('Copied day log (markdown)'); }catch(e){ toast('Copy failed — select & copy manually'); } }
function renderBlockLog(host,blockIdx,blockTitle){
  if(blockIdx===undefined||blockIdx===null) return;
  const k=todayKey(); const cur=(S.blockLogs[k]&&S.blockLogs[k][blockIdx])||{};
  const w=document.createElement('div');
  w.style.cssText='margin-top:18px;border:2px solid var(--ink);border-radius:12px;padding:12px 14px;background:var(--surface2)';
  w.innerHTML=`<div class="kicker" style="margin:0 0 6px">📝 Log this block${blockTitle?' — '+blockTitle:''}</div>
    <textarea class="bl-note" rows="2" style="width:100%;box-sizing:border-box" placeholder="How did it go? Tempo reached? What to change tomorrow?">${(cur.note||'').replace(/</g,'&lt;')}</textarea>
    <div class="row" style="margin-top:6px;align-items:center;gap:10px">
      <label class="sub" style="display:flex;gap:5px;align-items:center"><input type="checkbox" class="bl-adv" ${cur.advance?'checked':''}> ready to advance</label>
      <button class="tiny primary bl-save">Save log</button>
      <span class="sub bl-status">${cur.note||cur.advance?'saved ✓':''}</span></div>`;
  host.appendChild(w);
  const save=()=>{ S.blockLogs[k]=S.blockLogs[k]||{};
    const note=w.querySelector('.bl-note').value.trim(), adv=w.querySelector('.bl-adv').checked;
    if(!note&&!adv){ if(S.blockLogs[k]) delete S.blockLogs[k][blockIdx]; } else { S.blockLogs[k][blockIdx]={note,advance:adv,title:blockTitle||'',ts:Date.now()}; }
    saveState(); w.querySelector('.bl-status').textContent='saved ✓'; if(typeof renderRail==='function')renderRail(); };
  w.querySelector('.bl-save').onclick=save;
  w.querySelector('.bl-note').addEventListener('blur',save);
  w.querySelector('.bl-adv').addEventListener('change',save);
  return w;
}

  return P.plan.blocks.map(b=>({idx:b.idx,title:b.title,module:b.module,min:b.min,log:logs[b.idx]||null})); }

      <span class="pill ${r.log&&r.log.advance?'teal':''}" style="font-size:10px">${r.log?(r.log.advance?'advance ✓':'logged'):'—'}</span></div>
      ${r.log&&r.log.note?`<div class="sub" style="font-size:13px;margin-top:2px">${r.log.note.replace(/</g,'&lt;')}</div>`:''}</div>`).join('');

function dayLogMarkdown(){ const k=todayKey(); const P=todaysPicks(); const logs=S.blockLogs[k]||{};
  let m=`# Woodshed Log — ${k} (${DOW_NAMES[P.di.dow]}, week ${P.di.weekIdx+1})\n\n`;
  m+=`Focus: ${P.plan.focus}\nPrimary tune: ${P.tune.title} · review: ${P.reviewTune.title}, ${P.reviewTune2.title}\nLick of the day: ${P.lick.name}\n\n## Block logs\n`;
  P.plan.blocks.forEach(b=>{ const l=logs[b.idx]; m+=`\n### ${b.title}  _(${b.module}, ${b.min}m)_\n`;
    m+=l?`${l.note||'(checkbox only)'}\n- ready to advance: ${l.advance?'YES':'no'}\n`:`(not logged)\n`; });
  if(logs.day&&logs.day.note) m+=`\n## Overall day note\n${logs.day.note}\n`;
  const prsToday=[]; Object.entries(S.prs||{}).forEach(([id,arr])=>(arr||[]).filter(x=>x.d===k).forEach(x=>prsToday.push(`${id}: ${x.bpm}`)));
  if(prsToday.length) m+=`\n## PRs logged today\n- `+prsToday.join('\n- ')+`\n`;
  m+=`\n## Tune progress\n`; TUNES.forEach(t=>{ const rc=rungCount(t.id); if(rc>0||t.id===P.tune.id) m+=`- ${t.title}: rung ${rc}/5${isMemorized(t.id)?' (OWNED)':''}${S.pin===t.id?' [pinned]':''}\n`; });
  return m;
}
/* ==================== TRACK B — MISSION CONTROL EXPORT BRIDGE ====================
   Additive only. Serializes live S/derived state into the mission-control.schema.json
   shape so a morning agent can read + steer the backend brain. Reuses existing helpers
   (todaysPicks, pickTunes, rungCount, tuneSt, isMemorized, bestPR, ensureWeek, TUNES…).
   No localStorage writes; pure read. Exports prefer a direct write to the project folder
   via the woodshed_server.py bridge (POST /save-brain /save-day /save-feedback), falling
   back to a browser download when that server isn't serving the page. See
   mission-control.schema.json + woodshed_server.py. */
function downloadBlob(filename, text, mime){
  const blob=new Blob([text],{type:mime||'application/octet-stream'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=filename;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);
}
/* Write a file straight into the project folder through the woodshed_server.py save bridge.
   Resolves to the server's {ok:true,path} on success; throws on any failure (server not
   running, plain http.server, file://, 4xx) so callers can fall back to downloadBlob().
   Same-origin localhost POST — no data leaves this device. */
async function saveToServer(endpoint, text, mime){
  const res=await fetch(endpoint,{method:'POST',headers:{'Content-Type':mime||'text/plain'},body:text});
  let data=null; try{ data=await res.json(); }catch(e){}
  if(!res.ok||!data||data.ok!==true) throw new Error((data&&data.error)||('HTTP '+res.status));
  return data;
}
function buildMissionControl(){

  // per-tune progress: include any tune with progress, plus the primary (mirrors dayLogMarkdown filter)
  const tunes={};
  TUNES.forEach(t=>{ const rc=rungCount(t.id); if(rc>0||t.id===P.tune.id){ const st=tuneSt(t.id);
    tunes[t.id]={ title:t.title, rungStatus:rc, rungDates:st.r.slice(0,5),
      verifiedDate:st.v||null, memorized:isMemorized(t.id), pinned:S.pin===t.id }; } });
  // weekly objectives — same computation as the Today 'week-goals' card
  const lickNow=LICKS.reduce((a,l)=>a+Object.keys(S.lickKeys[l.id]||{}).length,0);
  const prNow={ladder:bestPR('ladder'),tongue:bestPR('single-tongue'),clarke:bestPR('clarke2'),trip:bestPR('16th-triplet')};
  const prGain=Object.keys(prNow).some(k=>prNow[k]>((wk.prs||{})[k]||0))?1:0;
  const transNow=S.sessions.filter(x=>x.label==='transcription').length-(wk.trans||0);
  const primaryT=TUNES.find(x=>x.id===wk.tune)||P.tune;
  const wo=[
    {label:'Primary tune: '+primaryT.title+' → rung '+Math.min(5,wk.rungStart+2),cur:rungCount(wk.tune)-wk.rungStart,tgt:2},
    {label:'Vocabulary: +8 lick-keys mastered',cur:lickNow-wk.lickStart,tgt:8},
    {label:'Speed: beat ANY tempo PR',cur:prGain,tgt:1},
    {label:'Ears: 3 transcription logs',cur:transNow,tgt:3}];
  const weeklyObjectives=wo.map(g=>({label:g.label,current:Math.max(0,g.cur),target:g.tgt,met:g.cur>=g.tgt}));
  // PR targets — current best vs hard-coded goals (see index.html)
  const lastPR=id=>{ const arr=S.prs[id]||[]; return arr.length?arr[arr.length-1].d:null; };
  const prTargets={
    'ladder':{best:bestPR('ladder'),goal:176,lastLogged:lastPR('ladder')},
    'clarke2':{best:bestPR('clarke2'),goal:144,lastLogged:lastPR('clarke2')},
    'single-tongue':{best:bestPR('single-tongue'),goal:132,lastLogged:lastPR('single-tongue')},
    '16th-triplet':{best:bestPR('16th-triplet'),goal:120,lastLogged:lastPR('16th-triplet')}};
  return {
    schemaVersion:'1.0',
    generatedAt:new Date().toISOString(),
    appStateKey:'woodshed_v1',
    streak:S.streak||0,
    lastDay:S.lastDay||null,
    week:{ index:di.weekIdx, displayNumber:di.weekIdx+1, isoStart, dow:di.dow, focus:(CURRICULUM[di.dow]||{}).focus||'' },
    primaryTune:primaryT.id,
    pinnedTune:S.pin||null,
    rotation:TUNES.map(t=>t.id),
    reviewTunes:[pk.secondary.id,pk.review.id],
    tunes,
    weeklyObjectives,
    // monthlyObjectives: not first-class state in S — left empty for the morning agent to own/steer
    monthlyObjectives:[],
    reviewSchedule:{
      reviewLickId:(P.reviewLick&&P.reviewLick.id)||null,
      reviewTuneIds:[pk.secondary.id,pk.review.id],
      weeklyExam:'Saturday jam-simulation: primary + 2 review tunes, head-in / choruses / head-out, no restarts.' },
    prTargets
  };
}

/* ==================== TRACK B — DAILY FEEDBACK -> OVERNIGHT LOOP (wood-9) ====================
   Additive only. Sibling to the mission-control export bridge. The closing block emits one
   append-ready feedback.jsonl line (NDJSON) describing how today actually felt, so a scheduled
   night agent can bend tomorrow's plan from real reactions. Quick controls persist into
   S.feedback[todayKey()] (mirrors S.blockLogs); everything else is derived from live S so the user
   re-enters nothing. Pure read; appends via the save bridge (POST /save-feedback) when the
   Woodshed server is running, else falls back to a download. See FEEDBACK-LOOP-SPEC.md. */
const FB_MODULES=['gym','vocab','tunes','ears','today'];
function fbState(){ const k=todayKey(); S.feedback=S.feedback||{};
  const f=S.feedback[k]||{}; f.reactions=f.reactions||{}; f.dropTomorrow=f.dropTomorrow||{}; f.moreOfThis=f.moreOfThis||{};
  if(!f.energy)f.energy='ok'; if(typeof f.timeTomorrow!=='number')f.timeTomorrow=60;
  S.feedback[k]=f; return f; }
function buildFeedback(){
  const di=dayInfo(); const P=todaysPicks(); const k=todayKey();
  const f=fbState();
  const rows=compileDayLog();                                  // [{idx,title,module,min,log}]
  const blocksLogged=rows.filter(r=>r.log&&(r.log.note||r.log.advance)).length;
  const blocksTotal=rows.length;
  // modules actually present in today's plan
  const presentModules=Array.from(new Set(rows.map(r=>r.module)));
  // moduleReactions: explicit selector wins; else infer from advance flags; else on_point
  const moduleReactions={};
  presentModules.forEach(m=>{
    if(f.reactions[m]){ moduleReactions[m]=f.reactions[m]; return; }
    const mr=rows.filter(r=>r.module===m&&r.log&&(r.log.note||r.log.advance));
    if(mr.length&&mr.every(r=>r.log.advance)) moduleReactions[m]='too_easy';
    else if(mr.some(r=>r.log&&r.log.note&&!r.log.advance)) moduleReactions[m]='too_hard';
    else moduleReactions[m]='on_point';
  });
  const blocks=rows.map(r=>({idx:r.idx,title:r.title,module:r.module,min:r.min,
    logged:!!(r.log&&(r.log.note||r.log.advance)),
    advance:!!(r.log&&r.log.advance),
    note:(r.log&&r.log.note)||''}));
  // owned vs shaky tunes: memorized OR a tune-block advanced => owned; tune-block logged-not-advanced => shaky
  const ownedTunes=[]; const shakyTunes=[];
  TUNES.forEach(t=>{ if(isMemorized(t.id)&&ownedTunes.indexOf(t.id)<0) ownedTunes.push(t.id); });
  const tuneRows=rows.filter(r=>r.module==='tunes'&&r.log);
  if(tuneRows.length){ const anyAdv=tuneRows.some(r=>r.log.advance);
    if(anyAdv){ if(ownedTunes.indexOf(P.tune.id)<0) ownedTunes.push(P.tune.id); }
    else { if(shakyTunes.indexOf(P.tune.id)<0&&ownedTunes.indexOf(P.tune.id)<0) shakyTunes.push(P.tune.id); } }
  const dropTomorrow=presentModules.filter(m=>f.dropTomorrow[m]);
  const moreOfThis=presentModules.filter(m=>f.moreOfThis[m]);
  const oneLine=(((S.blockLogs[k]||{}).day)||{}).note||'';
  return {
    schemaVersion:'1.0',
    date:k,
    generatedAt:new Date().toISOString(),
    weekIndex:di.weekIdx,
    dow:di.dow,
    focus:P.plan.focus,
    primaryTune:P.tune.id,
    blocksLogged,
    blocksTotal,
    blocksLoggedRatio:blocksTotal?Math.round(100*blocksLogged/blocksTotal)/100:0,
    moduleReactions,
    blocks,
    dropTomorrow,
    moreOfThis,
    energy:f.energy,
    timeTomorrow:f.timeTomorrow,
    ownedTunes,
    shakyTunes,
    oneLineForTomorrow:oneLine
  };
}

const PAGES={};
function tuneSt(id){ const v=S.tuneStatus[id]; return (v&&v.r)?v:{r:[null,null,null,null,null],v:null}; }
function rungCount(id){ return tuneSt(id).r.filter(Boolean).length; }

/* 2-tune week with mastery gate: rotation suggests, rungs decide, pin overrides */
/* ==================== PLAN OVERRIDE (wood-9) ====================
   Reads an optional sibling file `plan-override.json` written by the
   nightly feedback agent (wood-15, NOT built here). When present AND its
   `date` matches today, it bends ONLY today's served plan — block minutes,
   order, inclusion, plus an optional pinned tune. When absent, malformed,
   or dated for another day, this is a complete no-op: the static CURRICULUM
   is served unchanged. Nothing here ever throws. See plan-override.schema.md
   for the contract. Levers mirror FEEDBACK-LOOP-SPEC.md §4.                */
let PLAN_OVERRIDE=null; // holds the validated override object once loaded for today, else null

// Async, boot-time. Fetch + validate + gate on today. Always resolves; never rejects.
async function loadPlanOverride(){
  PLAN_OVERRIDE=null;
  try{
    const res=await fetch('plan-override.json',{cache:'no-store'});
    if(!res||!res.ok) return; // absent / 404 / network → no-op
    let ov; try{ ov=await res.json(); }catch(e){ console.info('woodshed: plan-override.json present but not valid JSON — ignoring'); return; }
    if(!ov||typeof ov!=='object') return;
    // Gate: only apply when explicitly dated for TODAY. Stale/future override → no-op.
    if(ov.date!==todayKey()){ if(ov.date) console.info('woodshed: plan-override.json date '+ov.date+' != today '+todayKey()+' — ignoring'); return; }
    PLAN_OVERRIDE=ov;
    console.info('woodshed: plan-override.json applied for '+ov.date);
  }catch(e){ PLAN_OVERRIDE=null; console.info('woodshed: plan-override load failed — serving static curriculum'); }
}

// Pure: given a static curriculum day {day,focus,blocks[]}, return a NEW steered
// day object per the override patch. Never mutates the input. Used by todaysPicks().
// Honors §4 levers: setMinutes, dropModules/dropBlocks, addBlocks, order, scaleToMinutes.
// Floors every block at 5 min. Skips instructions that reference modules absent today.
function applyPlanOverride(day,ov){
  if(!day||!ov) return day;
  const MIN_FLOOR=5;
  try{
    // Work on a shallow clone of the blocks (and of each block) so CURRICULUM is untouched.
    let blocks=(day.blocks||[]).map(b=>Object.assign({},b));

    // 1) Full replacement form: explicit steered block list wins outright.
    if(Array.isArray(ov.blocks)&&ov.blocks.length){
      blocks=ov.blocks.map((b,i)=>{
        const base=(day.blocks||[]).find(x=>x.module===b.module&&(b.title==null||x.title===b.title))||{};
        const merged=Object.assign({},base,b);
        merged.module=b.module||base.module||'today';
        merged.title=b.title||base.title||(merged.module||'block');
        merged.min=Math.max(MIN_FLOOR,Math.round(Number(b.min!=null?b.min:base.min)||MIN_FLOOR));
        if(b.why!=null) merged.why=String(b.why);
        return merged;
      });
    } else {
      // 2) Patch form — applied in a deterministic order.
      // 2a) setMinutes: { "<module>": <min> } — override a module's block minutes.
      if(ov.setMinutes&&typeof ov.setMinutes==='object'){
        blocks.forEach(b=>{ if(Object.prototype.hasOwnProperty.call(ov.setMinutes,b.module)){
          const m=Number(ov.setMinutes[b.module]); if(isFinite(m)) b.min=Math.max(MIN_FLOOR,Math.round(m)); } });
      }
      // 2b) dropModules: ["gym",...] — remove all blocks of these modules (hard demote / dropTomorrow).
      if(Array.isArray(ov.dropModules)&&ov.dropModules.length){
        blocks=blocks.filter(b=>!ov.dropModules.includes(b.module));
      }
      // 2c) addBlocks: [{module,title,min,why}] — append steered blocks (moreOfThis promote).
      if(Array.isArray(ov.addBlocks)){
        ov.addBlocks.forEach(nb=>{ if(!nb||!nb.module) return;
          blocks.push({ module:nb.module, title:nb.title||nb.module, why:nb.why||'', preset:nb.preset,
            min:Math.max(MIN_FLOOR,Math.round(Number(nb.min)||MIN_FLOOR)) }); });
      }
      // 2d) order: ["module",...] — reorder by module; modules not listed keep their relative order, appended after.
      if(Array.isArray(ov.order)&&ov.order.length){
        const rank=m=>{ const i=ov.order.indexOf(m); return i<0?ov.order.length:i; };
        blocks=blocks.map((b,i)=>[b,i]).sort((a,b)=>{ const d=rank(a[0].module)-rank(b[0].module); return d!==0?d:a[1]-b[1]; }).map(p=>p[0]);
      }
      // 2e) scaleToMinutes: number — scale TOTAL block minutes to fit, preserving order, floor 5 each.
      if(ov.scaleToMinutes!=null){
        const target=Number(ov.scaleToMinutes);
        const total=blocks.reduce((a,b)=>a+(Number(b.min)||0),0);
        if(isFinite(target)&&target>0&&total>0){ const f=target/total;

/* per-lick PRIORITY KEYS (config-tab-driven, Phase 3). Stored in S.config.lickPriority[lickId] as

const DEFAULT_PRIORITY_KEYS=[CYCLE4[0],CYCLE4[3],CYCLE4[6],CYCLE4[9]];

function normTitle(s){ return String(s||'').toLowerCase().replace(/[^a-z0-9]/g,''); }
// Scale a branded card so the whole "page" fits from its top to the viewport bottom.
function fitCard(card){ if(!card) return; const wrap=card.parentElement; if(!wrap) return;
  card.style.transform=''; wrap.style.height='';
  const top=card.getBoundingClientRect().top;
  const target=window.innerHeight - top - 14;
  const h=card.scrollHeight;
  if(h>target && target>220){ const s=Math.max(0.8, target/h); card.style.transform='scale('+s+')'; wrap.style.height=Math.ceil(h*s)+14+'px'; }
}
// Branded chart card (title · B♭ tag · orange rule · notation · THE WOODSHED), fit to screen.
// Matches our PNG renders. opts: {title, composer, tag, fit}
function renderBrandedChart(el, abc, opts){
  opts=opts||{};
  const clean=abc.split('\n').filter(l=>!/^[TC]:/.test(l.trim())).join('\n'); // keep X/M/L/K, drop title/composer
  el.classList.add('cc-fit');
  el.innerHTML=`<div class="chartcard">
      <div class="cc-top"><div><div class="cc-title">${opts.title||''}</div>${opts.composer?`<div class="cc-comp">${opts.composer}</div>`:''}</div>
        ${opts.tag!==false?`<div class="cc-tag">${opts.tag||'B♭ TRUMPET'}</div>`:''}</div>
      <div class="cc-rule"></div><div class="cc-staff"></div><div class="cc-foot">THE WOODSHED</div></div>`;
  const card=el.querySelector('.chartcard'), staff=el.querySelector('.cc-staff');
  // Render each LINE as its own staff (clef/key/meter shown once per line, standard),
  // and compress the gap between lines via CSS. abcjs has no equal-measure mode, and
  // per-bar rendering repeats clef/key/meter — so we keep clean per-line systems.
  const lines=clean.split('\n'); const head=lines.filter(l=>/^[XMLK]:/.test(l.trim())).join('\n');
  const body=lines.filter(l=>l.trim()&&!/^[A-Za-z]:/.test(l.trim()));
  requestAnimationFrame(()=>{ try{
    const w=staff.clientWidth>80?staff.clientWidth-2:660;
    body.forEach(ln=>{ const d=document.createElement('div'); d.className='cc-line'; staff.appendChild(d);
      ABCJS.renderAbc(d, head+'\n'+ln, {scale:1.18, staffwidth:w, paddingtop:0,paddingbottom:0,paddingleft:0,paddingright:0,
        foregroundColor:'#1a150f', selectTypes:false, stretchlast:true});
      d.querySelectorAll('[data-name="chord"]').forEach(t=>{ const y=parseFloat(t.getAttribute('y'))||0; t.setAttribute('y',(y+13).toFixed(1)); });
    });
    if(opts.fit!==false) requestAnimationFrame(()=>fitCard(card));
  }catch(e){ staff.innerHTML='<div style="font-family:monospace;font-size:12px;color:#1a150f">'+clean.replace(/</g,'&lt;')+'</div>'; } });
}
