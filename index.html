    let cal=document.getElementById('reel-cal'); if(!cal){ cal=document.createElement('div'); cal.id='reel-cal'; cal.className='reel-cal'; document.body.appendChild(cal); }
    cal.innerHTML='<div class="reel-cal-bar"><b>Calibrate: '+t.title+'</b> — draw a box over each line <u>in the order it&#39;s played</u>. To repeat a line (D.C., repeats, A-A-B-A), just draw over it again — order is kept, not sorted. <span id="cal-count"></span>'
      +'<button id="cal-undo">Undo</button><button id="cal-clear">Clear</button><button class="primary" id="cal-save">Save</button><button id="cal-cancel">Cancel</button></div>'
      +'<div class="reel-cal-main"><div class="reel-cal-stage"><canvas id="cal-canvas"></canvas></div>'
      +'<div class="reel-cal-side"><h5>Played lines</h5><div id="cal-list"></div>'
      +'<div class="cal-sum" id="cal-sum"></div><div class="cal-hint">Set how many measures are in each line so the chords land in the right spot. The total must equal the tune&#39;s chart length ('+totBars+' measures).</div></div></div>';
    cal.classList.add('open');
    const cc=cal.querySelector('#cal-canvas'), cx=cc.getContext('2d'), listEl=cal.querySelector('#cal-list'), sumEl=cal.querySelector('#cal-sum');
    const sc=Math.min((window.innerHeight-150)/rbCanvas.height, (window.innerWidth-320)/rbCanvas.width);
    cc.width=Math.round(rbCanvas.width*sc); cc.height=Math.round(rbCanvas.height*sc);
    let boxes=(ReelCal.get(t.id)||[]).map(b=>({x0:b.x0*cc.width,y0:b.y0*cc.height,x1:b.x1*cc.width,y1:b.y1*cc.height,m:b.m||4}));
    let lastM=boxes.length?boxes[boxes.length-1].m:4, hover=-1;
    const drawCanvas=()=>{ cx.clearRect(0,0,cc.width,cc.height); cx.drawImage(rbCanvas,0,0,cc.width,cc.height); cx.lineWidth=2; cx.font='bold 14px Inter,sans-serif';
      boxes.forEach((b,i)=>{ const w=b.x1-b.x0,h=b.y1-b.y0; cx.fillStyle=i===hover?'rgba(232,78,16,0.34)':'rgba(232,78,16,0.16)'; cx.fillRect(b.x0,b.y0,w,h); cx.strokeStyle='#e84e10'; cx.strokeRect(b.x0,b.y0,w,h);
        const tag=(i+1)+' · '+b.m+'m', tw=cx.measureText(tag).width+10; cx.fillStyle='#e84e10'; cx.fillRect(b.x0,b.y0-19,tw,19); cx.fillStyle='#fff'; cx.fillText(tag,b.x0+5,b.y0-5); }); };
    const renderList=()=>{ listEl.innerHTML='';
      boxes.forEach((b,i)=>{ const row=document.createElement('div'); row.className='cal-row';
        row.innerHTML='<span class="cal-ix">'+(i+1)+'</span><span class="cal-lbl">line</span><button class="cal-dec">−</button><input class="cal-m-in" type="number" min="1" max="16" value="'+b.m+'"><button class="cal-inc">+</button><button class="cal-del" title="delete">×</button>';
        listEl.appendChild(row);
        const inp=row.querySelector('.cal-m-in');
        row.onmouseenter=()=>{ hover=i; drawCanvas(); }; row.onmouseleave=()=>{ hover=-1; drawCanvas(); };
        row.querySelector('.cal-dec').onclick=()=>{ b.m=Math.max(1,b.m-1); lastM=b.m; refresh(); };
        row.querySelector('.cal-inc').onclick=()=>{ b.m=Math.min(16,b.m+1); lastM=b.m; refresh(); };
        inp.onchange=()=>{ b.m=Math.max(1,Math.min(16,+inp.value||4)); lastM=b.m; refresh(); };
        row.querySelector('.cal-del').onclick=()=>{ boxes.splice(i,1); refresh(); };
      });
      const sum=boxes.reduce((a,b)=>a+b.m,0); sumEl.textContent='Measures: '+sum+' / '+totBars; sumEl.style.color = sum===totBars?'#46c46a':(sum>totBars?'#e0533a':'#e8a23a');
      cal.querySelector('#cal-count').textContent=boxes.length+' line'+(boxes.length===1?'':'s'); };
    const refresh=()=>{ drawCanvas(); renderList(); };
    refresh();
    let drag=null; const rel=e=>{ const r=cc.getBoundingClientRect(); return {x:e.clientX-r.left,y:e.clientY-r.top}; };
    cc.onmousedown=e=>{ drag=rel(e); };
    cc.onmousemove=e=>{ if(!drag)return; const p=rel(e); drawCanvas(); cx.strokeStyle='#e84e10'; cx.lineWidth=2; cx.strokeRect(drag.x,drag.y,p.x-drag.x,p.y-drag.y); };
    cc.onmouseup=e=>{ if(!drag)return; const p=rel(e); const x0=Math.min(drag.x,p.x),y0=Math.min(drag.y,p.y),x1=Math.max(drag.x,p.x),y1=Math.max(drag.y,p.y); drag=null; if(x1-x0>10&&y1-y0>6) boxes.push({x0,y0,x1,y1,m:lastM}); refresh(); };
    cal.querySelector('#cal-undo').onclick=()=>{ boxes.pop(); refresh(); };
    cal.querySelector('#cal-clear').onclick=()=>{ boxes=[]; refresh(); };
    cal.querySelector('#cal-cancel').onclick=()=>cal.classList.remove('open');
    cal.querySelector('#cal-save').onclick=()=>{ // keep DRAW ORDER (play order) — do NOT sort; repeats are intentional
      const frac=boxes.map(b=>({x0:b.x0/cc.width,y0:b.y0/cc.height,x1:b.x1/cc.width,y1:b.y1/cc.height,m:b.m}));
      ReelCal.set(t.id,frac); cal.classList.remove('open'); buildLines(curTune());
      if(typeof toast==='function')toast('Saved '+frac.length+' lines ('+frac.reduce((a,b)=>a+b.m,0)+' measures) for '+t.title); drawAll(); };
  }
  q('#reel-cal-btn').onclick=calibrate;
  const close=()=>{ stopReel(); cancelAnimationFrame(previewRaf); previewRaf=0; host.classList.remove('open'); document.removeEventListener('keydown',esc); };
  const esc=(e)=>{ if(e.key==='Escape'){ const c=document.getElementById('reel-cal'); if(c&&c.classList.contains('open')){ c.classList.remove('open'); return; } close(); } };
  document.addEventListener('keydown',esc); q('#reel-exit').onclick=close;
}
window.addEventListener('DOMContentLoaded',async ()=>{
  loadState();
  try{ const ck=JSON.parse(localStorage.getItem('woodshed_compknob')||'{}'); if(ck.s)Band.compSustain=ck.s; if(ck.b)Band.compBusy=ck.b; }catch(e){} // restore comp vibe knobs
  // Load Chris's persistent config (wood-31) BEFORE the override, so the override
  // can steer on TOP of the config-selected base (§5 precedence). Never throws; on
  // any failure WOODSHED_CONFIG stays null and behavior is the date-driven status quo.
  try{ await loadWoodshedConfig(); }catch(e){ /* no-op: date-driven defaults stand */ }
  // Bend today's plan to the nightly feedback override BEFORE the first render, if one exists.
  // loadPlanOverride() never throws; on any failure PLAN_OVERRIDE stays null and the static
  // curriculum is served unchanged. await keeps the initial Today's-6 in sync with the steer.
  try{ await loadPlanOverride(); }catch(e){ /* no-op: static curriculum stands */ }
  wireToolbar(); wirePDF(); wireFocus();
  Metro.setBpm(S.bpm||120);
  $('#metro-subdiv').value=String(Metro.subdiv);
  showPage('today'); renderRail();
  Sampled.ensure(); // preload soundfont instruments in the background so the band is cued before first play
  window.addEventListener('beforeunload',saveState);
});
window.addEventListener('error',e=>{ console.warn('woodshed err:',e.message); });

/* ==================== FROZEN MASTHEAD GEOMETRY ====================
   The toolbar + nav are a single frozen header; only page content scrolls beneath it.
   We keep nav pinned directly under the (variable-height) toolbar and publish the total
   header height to CSS as --head-h, which the sheet-music sizing math reads so charts
   fill exactly from below the masthead to the bottom of the viewport on any laptop. */
(function(){
  const tb=document.getElementById('toolbar'), nav=document.getElementById('nav');
  if(!tb||!nav) return;
  function sync(){
    const th=tb.offsetHeight;
    nav.style.top=th+'px';
    document.documentElement.style.setProperty('--head-h',(th+nav.offsetHeight)+'px');
  }
  sync();
  if(window.ResizeObserver){ const ro=new ResizeObserver(sync); ro.observe(tb); ro.observe(nav); }
  window.addEventListener('resize',sync);
  document.addEventListener('click',()=>requestAnimationFrame(sync)); // panels open/close, tab switches
  if(document.fonts&&document.fonts.ready) document.fonts.ready.then(sync);
  setTimeout(sync,400); setTimeout(sync,1200);
})();

/* ==================== AMBIENT WORLD — tempo clock ====================
   The pine shudders and the metronome road sweeps once per beat, but ONLY while the
   metronome is running, and the scene freezes for prefers-reduced-motion. We drive it
   off the real Metro engine so the motion is locked to the click, never random. */
(function(){
  const root=document.documentElement;
  function beat(){ const bpm=(window.Metro&&Metro.bpm)||120; root.style.setProperty('--beat-ms',(60000/Math.max(1,bpm))+'ms'); }
  function play(on){ root.style.setProperty('--play-state',on?'running':'paused'); if(on) beat(); }
  if(window.Metro){
    const _start=Metro.start.bind(Metro), _stop=Metro.stop.bind(Metro),
          _setBpm=(typeof Metro.setBpm==='function')?Metro.setBpm.bind(Metro):null;
    Metro.start=function(){ const r=_start(); play(true); return r; };
    Metro.stop =function(){ const r=_stop();  play(false); return r; };
    if(_setBpm) Metro.setBpm=function(v){ const r=_setBpm(v); beat(); return r; };
  }
  ['#bpm-slider','#bpm-display'].forEach(sel=>{ const el=document.querySelector(sel);
    if(el) el.addEventListener('input',()=>setTimeout(beat,0)); });
  beat(); play(false);
})();
</script>
